on: 
  push: 
    branches:
      - main

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: devops-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::861142265676:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:${{ github.sha }} .

      - name: Tag Docker image
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Push to ECR
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      # THIS IS YOUR CD TRIGGER (GitOps)
      - name: Update GitOps repo
        run: |
          git clone https://github.com/jatindeshpande/gitops.git
          cd gitops/helm/devops-app

          # update Helm values.yaml
          sed -i "s/tag:.*/tag: ${{ github.sha }}/" values.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Update image tag to ${{ github.sha }}"
          git push